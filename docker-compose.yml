version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: greensm-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: greensm_db
      TZ: Asia/Ho_Chi_Minh
      PGTZ: Asia/Ho_Chi_Minh
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - greensm_network

  qdrant:
    image: qdrant/qdrant:latest
    container_name: greensm-qdrant
    restart: always
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - greensm_network

volumes:
  postgres_data:
  qdrant_data:

networks:
  greensm_network:
    driver: bridge
